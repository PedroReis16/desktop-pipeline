name: Deploy Homolog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string
      build_linux:
        { description: "Build Linux (x86_64)", type: boolean, default: true }
      build_win:
        { description: "Build Windows (x86_64)", type: boolean, default: true }
      build_macos:
        { description: "Build MacOS (arm64)", type: boolean, default: true }

permissions:
  contents: read
  pull-requests: read

env:
  DOTNET_CONFIGURATION: HomologWinX64
  DOTNET_LINUX_CONFIGURATION: HomologLinuxX64

jobs:
  # ─────────────────────────────────────────────
  # 1. PREPARE BUILD ENVIRONMENT
  # Builds the projects matrix for the build environment.
  # The matrix is used to build the projects for the build environment.
  # ─────────────────────────────────────────────
  prepare_build:
    name: Prepare build environment
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    outputs:
      go_matrix: ${{ steps.compute_matrix.outputs.go_matrix }}
      node_matrix: ${{ steps.compute_matrix.outputs.node_matrix }}
      dotnet_matrix: ${{ steps.compute_matrix.outputs.dotnet_matrix }}
      dotnet_libraries_matrix: ${{ steps.compute_matrix.outputs.dotnet_libraries_matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version, changelog and tags
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${VERSION// }" ]]; then
            echo "::error::Versão não informada."
            exit 1
          fi

          CHANGELOG_FILE="CHANGELOG.md"
          if [[ ! -f "$CHANGELOG_FILE" ]]; then
            echo "::error::Arquivo ${CHANGELOG_FILE} não encontrado."
            exit 1
          fi

          VERSION_ESCAPED=$(printf '%s' "$VERSION" | sed 's/[.[\*^$()+?{|]/\\&/g')
          if ! grep -qE "^\#\s*\*\*\[${VERSION_ESCAPED}\]" "$CHANGELOG_FILE"; then
            echo "::error::CHANGELOG não contém entrada para a versão ${VERSION}."
            echo "Esperado um bloco no formato: # **[${VERSION}] - YYYY-MM-DD**"
            exit 1
          fi
          echo "CHANGELOG contém entrada para a versão ${VERSION}."

          if git rev-parse "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "::error::A tag de produção '${VERSION}' já existe."
            echo "Esta versão já foi lançada em produção — atualize o CHANGELOG e informe uma nova versão antes de prosseguir."
            exit 1
          fi

          HOM_TAG="hom-${VERSION}"
          if git rev-parse "refs/tags/${HOM_TAG}" >/dev/null 2>&1; then
            echo "Tag de homologação ${HOM_TAG} já existe — será atualizada ao final do processo."
          else
            echo "Tag de homologação ${HOM_TAG} ainda não existe — será criada ao final do processo."
          fi

      - name: Build projects matrix
        id: compute_matrix
        shell: bash
        run: |
          set -euo pipefail

          read -r -d '' DOTNET_LIBRARIES <<'EOF' || true
          [
            {
              "name": "Desktop.Database",
              "path": "workerservices/Libraries/Desktop.Database",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Database.UnitTests"
            },
            {
              "name": "Desktop.Models",
              "path": "workerservices/Libraries/Desktop.Models",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Models.UnitTests"
            }
          ]
          EOF
          DOTNET_LIBRARIES_MATRIX=$(jq -c <<< "$DOTNET_LIBRARIES")
          {
            echo "dotnet_libraries_matrix=$DOTNET_LIBRARIES_MATRIX"
          } >> "$GITHUB_OUTPUT"

          read -r -d '' PROJECTS <<'EOF' || true
          [
            {
              "name": "desktop-ui",
              "type": "node",
              "path": "desktop-ui"
            },
            {
              "name": "desktop-cmd",
              "type": "go",
              "path": "desktop-cmd",
              "go_mod": "desktop-cmd/go.mod",
              "go_sum": "desktop-cmd/go.sum"
            },
            {
              "name": "Desktop.Export",
              "type": "dotnet",
              "path": "workerservices/Desktop.Export",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Export.UnitTests",
              "integration_tests": "workerservices/Tests/Integration/Desktop.Export.IntegrationTests"
            },
            {
              "name": "Desktop.Import",
              "type": "dotnet",
              "path": "workerservices/Desktop.Import",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Import.UnitTests",
              "integration_tests": "workerservices/Tests/Integration/Desktop.Import.IntegrationTests"
            },
            {
              "name": "Desktop.Instance",
              "type": "dotnet",
              "path": "workerservices/Desktop.Instance",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Instance.UnitTests",
              "integration_tests": "workerservices/Tests/Integration/Desktop.Instance.IntegrationTests"
            },
            {
              "name": "Desktop.Integration",
              "type": "dotnet",
              "path": "workerservices/Desktop.Integration",
              "unit_tests": "workerservices/Tests/Unit/Desktop.Integration.UnitTests",
              "integration_tests": "workerservices/Tests/Integration/Desktop.Integration.IntegrationTests"
            },
            {
              "name": "Desktop.InterfaceAPI",
              "type": "dotnet",
              "path": "workerservices/Desktop.InterfaceAPI",
              "unit_tests": "workerservices/Tests/Unit/Desktop.InterfaceAPI.UnitTests",
              "integration_tests": "workerservices/Tests/Integration/Desktop.InterfaceAPI.IntegrationTests"
            }
          ]
          EOF
          GO_MATRIX=$(jq -c '[.[] | select(.type == "go")]'    <<< "$PROJECTS")
          NODE_MATRIX=$(jq -c '[.[] | select(.type == "node")]' <<< "$PROJECTS")
          DOTNET_MATRIX=$(jq -c '[.[] | select(.type == "dotnet")]' <<< "$PROJECTS")
          {
            echo "go_matrix=$GO_MATRIX"
            echo "node_matrix=$NODE_MATRIX"
            echo "dotnet_matrix=$DOTNET_MATRIX"
          } >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────
  # 3. QUALIDADE - GO
  # Um job por linguagem. A matriz vem só com os projetos Go; se estiver
  # vazia, o job inteiro é pulado. Sem condicionais por step.
  # ─────────────────────────────────────────────
  quality_go:
    needs: [prepare_build]
    if: needs.prepare_build.outputs.go_matrix != '[]'
    uses: ./.github/workflows/quality-golang.yml
    with:
      go_matrix: ${{ needs.prepare_build.outputs.go_matrix }}
      run_integration_tests: false

  # ─────────────────────────────────────────────
  # 3. QUALIDADE - NODE
  # ─────────────────────────────────────────────
  quality_node:
    needs: [prepare_build]
    if: needs.prepare_build.outputs.node_matrix != '[]'
    uses: ./.github/workflows/quality-angular.yml
    with:
      node_matrix: ${{ needs.prepare_build.outputs.node_matrix }}

  # ─────────────────────────────────────────────
  # 3. QUALIDADE - .NET
  # ─────────────────────────────────────────────
  quality_service_libraries:
    needs: [prepare_build]
    if: needs.prepare_build.outputs.dotnet_libraries_matrix != '[]'
    uses: ./.github/workflows/quality-csharp.yml
    with:
      dotnet_matrix: ${{ needs.prepare_build.outputs.dotnet_libraries_matrix }}
      run_integration_tests: false

  quality_services:
    needs: [prepare_build]
    if: needs.prepare_build.outputs.dotnet_matrix != '[]'
    uses: ./.github/workflows/quality-csharp.yml
    with:
      dotnet_matrix: ${{ needs.prepare_build.outputs.dotnet_matrix }}
      run_integration_tests: true

  # ─────────────────────────────────────────────
  # 4. CI GATE
  # Job único que consolida o resultado de todos
  # os outros. Configure APENAS este job como
  # "required status check" no branch protection.
  # ─────────────────────────────────────────────
  ci_gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      [quality_go, quality_node, quality_service_libraries, quality_services]
    if: always()
    steps:
      - name: Check all results
        run: |
          set -euo pipefail

          GO="${{ needs.quality_go.result }}"
          NODE="${{ needs.quality_node.result }}"
          DOTNET_LIBRARIES="${{ needs.quality_service_libraries.result }}"
          DOTNET_SERVICES="${{ needs.quality_services.result }}"

          echo "quality_go:           $GO"
          echo "quality_node:         $NODE"
          echo "quality_service_libraries: $DOTNET_LIBRARIES"
          echo "quality_services:       $DOTNET_SERVICES"

          FAIL=0

          # Todos os jobs obrigatórios (rodam sempre)

          # Jobs condicionais: só falha se rodaram E falharam.
          # Se for skipped, não é obrigatório para esta PR.
          if [[ "$GO" != "skipped" && "$GO" != "success" ]]; then
            echo "::error::A validação de qualidade Go falhou."
            FAIL=1
          fi
          if [[ "$NODE" != "skipped" && "$NODE" != "success" ]]; then
            echo "::error::A validação de qualidade Node falhou."
            FAIL=1
          fi
          if [[ "$DOTNET_LIBRARIES" != "skipped" && "$DOTNET_LIBRARIES" != "success" ]]; then
            echo "::error::A validação de qualidade .NET Libraries falhou."
            FAIL=1
          fi
          if [[ "$DOTNET_SERVICES" != "skipped" && "$DOTNET_SERVICES" != "success" ]]; then
            echo "::error::A validação de qualidade .NET Services falhou."
            FAIL=1
          fi

          if [[ "$FAIL" -ne 0 ]]; then
            echo "::error::Um ou mais jobs obrigatórios falharam."
            exit 1
          fi

          echo "CI concluído com sucesso"

  # ─────────────────────────────────────────────
  # 5. DEPLOY
  # ─────────────────────────────────────────────
  build_windows:
    needs: [ci_gate]
    if: inputs.build_win == true
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/build-windows.yml
    with:
      version: ${{ inputs.version }}
      configuration: HomologWinX64

  build_linux:
    needs: [ci_gate]
    if: inputs.build_linux == true
    permissions:
      contents: read
      actions: write
    uses: ./.github/workflows/build-linux.yml
    with:
      version: ${{ inputs.version }}
      configuration: HomologLinuxX64

  # ─────────────────────────────────────────────
  # 6. RELEASE — publica os bundles como GitHub Release
  # Artefatos gerados em workflows reutilizáveis ficam
  # disponíveis na mesma workflow run para download aqui.
  # ─────────────────────────────────────────────
  deploy:
    name: Publish homolog release
    needs: [build_windows, build_linux]
    if: |
      !cancelled() &&
      (needs.build_windows.result == 'success' || needs.build_linux.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows bundle
        if: needs.build_windows.result == 'success'
        uses: actions/download-artifact@v5
        with:
          name: DesktopServices-HomologWinX64
          path: release-assets/windows

      - name: Download Linux bundle
        if: needs.build_linux.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v5
        with:
          name: DesktopServices-HomologLinuxX64
          path: release-assets/linux

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version }}
          TAG: hom-${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob

          mapfile -t files < <(find release-assets -type f)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::Nenhum artefato de build encontrado para publicar."
            exit 1
          fi

          notes="## Homolog ${VERSION}

          Publicação de homologação — [workflow #${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."

          if [[ "${{ needs.build_windows.result }}" == "success" ]]; then
            notes+=$'\n\n- **Windows x64:** `DesktopServices.exe`'
          fi
          if [[ "${{ needs.build_linux.result }}" == "success" ]]; then
            notes+=$'\n- **Linux x64 (.deb):** `desktopservices_*_amd64.deb` — CLI + servicos (`sudo dpkg -i`)'
            notes+=$'\n- **Linux x64 (AppImage):** `DesktopServices-*-x86_64.AppImage` — CLI + servicos + UI (`sudo ./DesktopServices-*-x86_64.AppImage --install`, UI: `./DesktopServices-*-x86_64.AppImage --ui`)'
          fi

          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TAG já existe — atualizando assets."
            gh release upload "$TAG" "${files[@]}" --repo "${{ github.repository }}" --clobber
            gh release edit "$TAG" --repo "${{ github.repository }}" --prerelease --notes "$notes"
          else
            gh release create "$TAG" "${files[@]}" \
              --repo "${{ github.repository }}" \
              --title "Homolog $VERSION" \
              --prerelease \
              --notes "$notes"
          fi

          echo "Release publicada: ${GITHUB_SERVER_URL}/${{ github.repository }}/releases/tag/$TAG"

      - uses: actions/checkout@v5
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Update homolog tag to current commit
        env:
          VERSION: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="hom-${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa "$TAG" -m "Homolog ${VERSION} — workflow #${{ github.run_number }}"
          git push origin "refs/tags/${TAG}" --force
          echo "Tag ${TAG} atualizada para o commit ${GITHUB_SHA}."
