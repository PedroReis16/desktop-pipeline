name: Deploy Homolog

on:
    workflow_dispatch:
        inputs:
            branch:
                description: 'Branch to deploy'
                required: true
                default: 'homolog'

permissions:
    contents: read
    pull-requests: read

jobs:
    # ─────────────────────────────────────────────
    # 1. DETECÇÃO DE MUDANÇAS
    # Constrói uma matriz dinâmica com apenas os projetos
    # que tiveram arquivos alterados nesta PR.
    # ─────────────────────────────────────────────
    detect-changes:
        name: Detect changed projects
        runs-on: ubuntu-latest
        outputs:
            projects_matrix: ${{ steps.compute_matrix.outputs.projects_matrix }}
        steps:
            - uses: actions/checkout@v4
              with:
                fetch-depth: 0

                